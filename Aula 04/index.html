<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrícula FATEC - Aula 3</title>
</head>
<body>
    <header>
        <h1>Formulário de Matrícula FATEC</h1>
    </header>

    <main>
        <form action="#" method="post" enctype="multipart/form-data">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <p>
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" name="nome" required minlength="5">
                </p>
                <p>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </p>
                <p>
                    <label for="nascimento">Data de Nascimento:</label>
                    <input type="date" id="nascimento" name="nascimento">
                </p>
                <p>
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00">
                    <small>Formato: 000.000.000-00</small>
                </p>
                <p>
                    <label for="foto">Foto de Perfil:</label>
                    <input type="file" id="foto" name="foto" accept="image/*">
                </p>
                <p>
                    <label for="cor">Cor Favorita:</label>
                    <input type="color" id="cor" name="cor" value="#ff0000">
                </p>
            </fieldset>

            <fieldset>
                <legend>Dados Acadêmicos</legend>
                <p>
                    <label for="curso">Curso:</label>
                    <select id="curso" name="curso">
                        <option value="ads">Análise e Desenvolvimento de Sistemas</option>
                        <option value="dsm">Desenvolvimento de Software Multiplataforma</option>
                        <option value="ge">Gestão Empresarial</option>
                    </select>
                </p>
                <p>
                    Período:<br>
                    <input type="radio" id="manha" name="periodo" value="manha">
                    <label for="manha">Manhã</label><br>
                    <input type="radio" id="noite" name="periodo" value="noite">
                    <label for="noite">Noite</label>
                </p>
                <p>
                    <input type="checkbox" id="programou" name="programou">
                    <label for="programou">Já programou antes?</label>
                </p>
            </fieldset>

            <p>
                <label for="obs">Observações:</label><br>
                <textarea id="obs" name="obs" rows="4" cols="50" placeholder="Escreva aqui suas observações..."></textarea>
            </p>

            <p>
                <button type="submit">Enviar Matrícula</button>
            </p>
        </form>
    </main>

    <footer>
        <p>FATEC 2026</p>
    </footer>
</body>
</html>
